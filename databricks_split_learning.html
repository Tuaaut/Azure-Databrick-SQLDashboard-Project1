<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Databricks Split Learning</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #172033;
      background: #eef1f6;
      display: grid;
      grid-template-rows: 48px 1fr;
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 14px;
      background: #111827;
      color: white;
      border-bottom: 1px solid #273244;
    }
    header h1 {
      margin: 0;
      font-size: 15px;
      font-weight: 750;
    }
    nav {
      display: flex;
      gap: 8px;
      align-items: center;
      overflow-x: auto;
    }
    nav button,
    nav a {
      border: 1px solid #3b4657;
      background: #1d2533;
      color: white;
      border-radius: 7px;
      padding: 7px 10px;
      font: inherit;
      font-size: 13px;
      text-decoration: none;
      white-space: nowrap;
      cursor: pointer;
    }
    .grid {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(420px, 54%) 1fr;
      gap: 6px;
      padding: 6px;
    }
    section {
      min-width: 0;
      min-height: 0;
      border: 1px solid #cfd6e2;
      background: white;
      border-radius: 8px;
      overflow: hidden;
      display: grid;
      grid-template-rows: 34px 1fr;
    }
    .bar {
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      border-bottom: 1px solid #d9dee8;
      background: #f8fafc;
      font-size: 13px;
      font-weight: 700;
    }
    .bar a {
      color: #1463ff;
      font-weight: 700;
      text-decoration: none;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
    }
    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
        grid-template-rows: 52vh 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>Databricks Split Learning</h1>
    <nav>
      <button data-url="https://adb-7405612371776871.11.azuredatabricks.net/?o=7405612371776871">Home</button>
      <button data-url="https://adb-7405612371776871.11.azuredatabricks.net/explore/data?o=7405612371776871">Data</button>
      <button data-url="https://adb-7405612371776871.11.azuredatabricks.net/compute/interactive?o=7405612371776871">Compute</button>
      <button data-url="https://adb-7405612371776871.11.azuredatabricks.net/sql/warehouses?o=7405612371776871">SQL Warehouses</button>
      <button data-url="https://adb-7405612371776871.11.azuredatabricks.net/dashboardsv3/01f1699203951f9389c58c97cd030c79/published?o=7405612371776871">Dashboard</button>
    </nav>
  </header>
  <div class="grid">
    <section>
      <div class="bar">
        <span>Databricks</span>
        <a id="openExternal" href="https://adb-7405612371776871.11.azuredatabricks.net/explore/data?o=7405612371776871" target="_blank">open full page</a>
      </div>
      <iframe id="dbx" src="https://adb-7405612371776871.11.azuredatabricks.net/explore/data?o=7405612371776871"></iframe>
    </section>
    <section>
      <div class="bar">
        <span>Quiz</span>
        <a href="/databricks_quiz.html" target="_blank">open full page</a>
      </div>
      <iframe src="/databricks_quiz.html"></iframe>
    </section>
  </div>
  <script>
    const frame = document.getElementById("dbx");
    const openExternal = document.getElementById("openExternal");
    document.querySelectorAll("button[data-url]").forEach((button) => {
      button.addEventListener("click", () => {
        const url = button.dataset.url;
        frame.src = url;
        openExternal.href = url;
      });
    });
  </script>
</body>
</html>
